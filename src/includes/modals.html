<div class="remodal modal-question" data-remodal-id="modal-question">
    <button data-remodal-action="close" class="remodal-close"></button>
    <div class="modal-question__header">
        <div class="modal-question__title">Задать вопрос</div>
        <div class="modal-question__subtitle">Напишите свой вопрос в форме ниже, мы обязательно ответим на него</div>
    </div>
    <div class="modal-question__body">
        <form action="" class="modal-question__form">
            <div class="form-group">
                <label class="form-label" for="">Имя</label>
                <input type="text" class="form-control" placeholder="Сергеев Сергей Сергеевич">
            </div>
            <div class="form-group">
                <label class="form-label" for="">Телефон</label>
                <input type="text" class="form-control" placeholder="+7 (___) ___-__-__">
            </div>
            <div class="form-group">
                <label class="form-label" for="">Email</label>
                <input type="text" class="form-control" placeholder="tpp@udmtpp.ru">
            </div>
            <div class="form-group">
                <label class="form-label" for="">Ваш вопрос</label>
                <textarea  class="form-control" name="" id="" cols="30" rows="10" placeholder="Идейные соображения высшего порядка,
а также постоянное... "></textarea>
            </div>
            <div class="modal-question__footer">
                <p>Нажимая на кнопку,<br>
                    вы соглашаетесь<br>
                    <a href="#"> с условиями обработки данных</a></p>
                <button data-remodal-action="confirm" class="btn btn-secondary">Отправить</button>
            </div>
        </form>
    </div>
    <div>

    </div>
</div>

<!-- Кнопка открытия -->
<a href="#modal-question">Открыть модалку</a>
